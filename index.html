<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Roboto', system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #f8fafc 0%, #e0e7ff 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .form-container {
            background: white;
            width: 100%;
            max-width: 420px;
            border-radius: 28px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.08);
            overflow: hidden;
            border: 1px solid #e5e7eb;
        }

        .form-header {
            background: linear-gradient(135deg, #3b82f6, #6366f1);
            padding: 0;
            overflow: hidden;
        }

        .header-banner {
            display: block;
            width: 100%;
            height: 180px;
            object-fit: cover;
            /* Fits and crops if necessary */
        }

        .form-header p {
            color: white;
            text-align: center;
            padding: 15px 20px 20px;
            font-size: 15px;
            margin: 0;
        }

        .form-header h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .form-header p {
            font-size: 15.5px;
            opacity: 0.92;
            font-weight: 400;
        }

        .form-body {
            padding: 40px 32px;
        }

        .input-group {
            margin-bottom: 26px;
        }

        label {
            display: block;
            margin-bottom: 9px;
            font-weight: 500;
            color: #374151;
            font-size: 15px;
        }

        input,
        textarea {
            width: 100%;
            padding: 16px 18px;
            border: 1.5px solid #d1d5db;
            border-radius: 16px;
            font-size: 16px;
            font-family: 'Roboto', sans-serif;
            background: #f9fafb;
            transition: all 0.3s ease;
        }

        input:focus,
        textarea:focus {
            outline: none;
            border-color: #3b82f6;
            background: white;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.15);
        }

        textarea {
            min-height: 125px;
            resize: vertical;
        }

        .submit-btn {
            width: 100%;
            padding: 17px;
            background: linear-gradient(135deg, #3b82f6, #6366f1);
            color: white;
            border: none;
            border-radius: 16px;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
            transition: all 0.3s ease;
            box-shadow: 0 8px 25px rgba(59, 130, 246, 0.25);
        }

        .submit-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 30px rgba(59, 130, 246, 0.35);
        }

        .submit-btn:active {
            transform: scale(0.98);
        }

        .required {
            color: #ef4444;
        }
    </style>
</head>

<body>

    <div class="form-container">
        <!-- Header -->
        <div class="form-header">
            <img src="assets/banner.jpeg" alt="Banner" class="header-banner">

            <!-- <h1>Contact Us</h1> -->
            <p>We'd love to hear from you. Reach out anytime.</p>
        </div>

        <!-- Form Body -->
        <div class="form-body">
            <form id="contactForm">

                <div class="input-group">
                    <label for="name">Full Name <span class="required">*</span></label>
                    <input type="text" id="name" required placeholder="Enter your full name">
                </div>

                <div class="input-group">
                    <label for="email">Email Address <span class="required">*</span></label>
                    <input type="email" id="email" required placeholder="your@email.com">
                </div>

                <div class="input-group">
                    <label for="mobile">Mobile Number <span class="required">*</span></label>
                    <input type="tel" id="mobile" required placeholder="+91 9818432810">
                </div>

                <div class="input-group">
                    <label for="message">Message <span class="required">*</span></label>
                    <textarea id="message" required placeholder="Write your message here..."></textarea>
                </div>

                <button type="submit" class="submit-btn" id="submitBtn">
                    Submit
                </button>
            </form>
        </div>
    </div>

    <script>
        const form = document.getElementById('contactForm');
        const submitBtn = document.getElementById('submitBtn');

        form.addEventListener('submit', function (e) {
            e.preventDefault();

            // Disable button and show loading state
            submitBtn.disabled = true;
            submitBtn.textContent = 'Submitting...';

            // Simulate form processing (you can replace this with actual form submission logic)
            setTimeout(() => {
                // Directly navigate to the website after "submission"
                window.location.href = "https://www.tomazinakfe.com";
            }, 1200);
        });
    </script>

</body>

</html>
